name: Build Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@4c125117fe7c5aed11272ec4213f602f012f89f2 # v5

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Create ephemeral CI release key
        run: |
          keytool -genkeypair -noprompt \
            -keystore "$RUNNER_TEMP/telemachus-ci-release.jks" \
            -storepass ci-only-password \
            -keypass ci-only-password \
            -alias telemachus-ci \
            -dname "CN=Telemachus CI Ephemeral, O=Source Build" \
            -keyalg RSA -keysize 3072 -validity 1
          {
            echo "TELEMACHUS_KEYSTORE_FILE=$RUNNER_TEMP/telemachus-ci-release.jks"
            echo "TELEMACHUS_KEYSTORE_PASSWORD=ci-only-password"
            echo "TELEMACHUS_KEY_ALIAS=telemachus-ci"
            echo "TELEMACHUS_KEY_PASSWORD=ci-only-password"
          } >> "$GITHUB_ENV"

      - name: Unit tests, Android lint, and builds
        working-directory: AndroidClient
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug assembleRelease

      - name: Install verified ktlint
        working-directory: AndroidClient
        env:
          KTLINT_VERSION: 1.1.1
          KTLINT_SHA256: 9c64315aaa645ceeec867e22c511ec8614ae8dd77ff2102317052fa194249405
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output ktlint \
            "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          echo "${KTLINT_SHA256}  ktlint" | sha256sum --check
          chmod 0755 ktlint

      - name: Kotlin formatting
        working-directory: AndroidClient
        run: ./ktlint --relative "app/src/**/*.kt"

      - name: Reject debug-signed release output
        working-directory: AndroidClient
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          test -n "$APKSIGNER"
          "$APKSIGNER" verify --print-certs "$APK" > signing.txt
          if grep -q "CN=Android Debug" signing.txt; then
            echo "Release APK must never use the Android debug certificate."
            exit 1
          fi
          grep -q "CN=Telemachus CI Ephemeral" signing.txt
          echo "Release APK is signed only with the one-run CI key."
