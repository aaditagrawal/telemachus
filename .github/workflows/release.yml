name: Release

on:
  push:
    tags:
      - "[0-9]*"
      - "v[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      app_version: ${{ steps.version.outputs.app_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Require the tagged commit to be origin/main
        run: |
          git fetch origin main:refs/remotes/origin/main --no-tags
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" || {
            echo "Release tags must point exactly at origin/main."
            exit 1
          }

      - name: Require a semantic-version tag with a matching changelog
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$GITHUB_REF_NAME"
          if [[ "$VERSION" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)(-[0-9A-Za-z.-]+)?$ ]]; then
            APP_VERSION="${BASH_REMATCH[1]}"
          else
            echo "Tag '$VERSION' is not a supported release version." >&2
            exit 1
          fi
          IS_PRERELEASE=false
          if [ -n "${BASH_REMATCH[2]:-}" ]; then
            IS_PRERELEASE=true
          fi
          grep -Fq "## [$VERSION]" CHANGELOG.md
          UNRELEASED="$(awk '
            /^## \[Unreleased\]$/ {flag=1; next}
            flag && /^---$/ {exit}
            flag {print}
          ' CHANGELOG.md)"
          if printf '%s\n' "$UNRELEASED" |
             grep -Eq '^### (Added|Changed|Deprecated|Removed|Fixed|Security)$'; then
            echo "Move completed Unreleased entries into the $VERSION section before tagging."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

  build-mac:
    needs: validate
    runs-on: macos-14
    env:
      TELEMACHUS_VERSION: ${{ needs.validate.outputs.app_version }}
      TELEMACHUS_ARTIFACT_VERSION: ${{ needs.validate.outputs.version }}
    outputs:
      release_mode: ${{ steps.signing.outputs.mode }}
      artifact_suffix: ${{ steps.signing.outputs.suffix }}
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test host
        working-directory: MacHost
        run: |
          swift test
          swift run Telemachus --transport-self-test

      - name: Install pinned SwiftLint
        run: ./scripts/install-swiftlint.sh

      - name: Swift lint
        working-directory: MacHost
        run: swiftlint lint --config .swiftlint.yml --strict

      - name: Build universal release binary
        working-directory: MacHost
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          mkdir -p .build/release-universal
          lipo -create \
            .build/arm64-apple-macosx/release/Telemachus \
            .build/x86_64-apple-macosx/release/Telemachus \
            -output .build/release-universal/Telemachus

      - name: Select macOS release trust level
        id: signing
        env:
          CERTIFICATE: ${{ secrets.TELEMACHUS_MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.TELEMACHUS_MACOS_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.TELEMACHUS_MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.TELEMACHUS_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.TELEMACHUS_APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.TELEMACHUS_APP_SPECIFIC_PASSWORD }}
        run: |
          configured=0
          values=(
            "$CERTIFICATE"
            "$CERTIFICATE_PASSWORD"
            "$SIGNING_IDENTITY"
            "$APPLE_ID"
            "$APPLE_TEAM_ID"
            "$APP_PASSWORD"
          )
          for value in "${values[@]}"; do
            if [ -n "$value" ]; then
              configured=$((configured + 1))
            fi
          done
          if [ "$configured" -eq 6 ]; then
            echo "mode=developer-id" >> "$GITHUB_OUTPUT"
            echo "suffix=mac-universal" >> "$GITHUB_OUTPUT"
          elif [ "$configured" -eq 0 ]; then
            echo "mode=unsigned-source-build" >> "$GITHUB_OUTPUT"
            echo "suffix=mac-universal-unsigned-source-build" >> "$GITHUB_OUTPUT"
            echo "No Apple distribution credentials are configured."
            echo "The release will be a clearly labeled, ad-hoc signed source build."
          else
            echo "Partial macOS signing configuration is unsafe."
            echo "Configure all six TELEMACHUS macOS secrets or remove all of them."
            exit 1
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.mode == 'developer-id'
        env:
          CERTIFICATE: ${{ secrets.TELEMACHUS_MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.TELEMACHUS_MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/telemachus-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          printf '%s' "$CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Package signed app and DMG
        if: steps.signing.outputs.mode == 'developer-id'
        env:
          TELEMACHUS_SIGNING_IDENTITY: ${{ secrets.TELEMACHUS_MACOS_SIGNING_IDENTITY }}
          TELEMACHUS_ARTIFACT_SUFFIX: mac-universal
        run: ./scripts/package_mac.sh

      - name: Package ad-hoc signed source build
        if: steps.signing.outputs.mode == 'unsigned-source-build'
        env:
          TELEMACHUS_SIGNING_IDENTITY: "-"
          TELEMACHUS_ARTIFACT_SUFFIX: mac-universal-unsigned-source-build
        run: ./scripts/package_mac.sh

      - name: Notarize and staple signed DMG
        if: steps.signing.outputs.mode == 'developer-id'
        env:
          APPLE_ID: ${{ secrets.TELEMACHUS_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.TELEMACHUS_APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.TELEMACHUS_APP_SPECIFIC_PASSWORD }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          DMG="Telemachus-${VERSION}-mac-universal.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl --assess --type open --context context:primary-signature -v "$DMG"

      - name: Verify package
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          ARTIFACT_SUFFIX: ${{ steps.signing.outputs.suffix }}
        run: |
          DMG="Telemachus-${VERSION}-${ARTIFACT_SUFFIX}.dmg"
          test -f "$DMG"
          codesign --verify --deep --strict --verbose=2 Telemachus.app
          shasum -a 256 "$DMG" > "${DMG}.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-dmg
          if-no-files-found: error
          path: |
            Telemachus-*.dmg
            Telemachus-*.dmg.sha256

  build-android:
    needs: validate
    runs-on: ubuntu-24.04
    env:
      TELEMACHUS_VERSION: ${{ needs.validate.outputs.app_version }}
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@4c125117fe7c5aed11272ec4213f602f012f89f2 # v5

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.TELEMACHUS_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.TELEMACHUS_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.TELEMACHUS_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.TELEMACHUS_KEY_PASSWORD }}
        run: |
          for value in "$KEYSTORE_BASE64" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
            test -n "$value" || {
              echo "All Android release-signing secrets are required."
              exit 1
            }
          done
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/telemachus-release.jks"
          {
            echo "TELEMACHUS_KEYSTORE_FILE=$RUNNER_TEMP/telemachus-release.jks"
            echo "TELEMACHUS_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "TELEMACHUS_KEY_ALIAS=$KEY_ALIAS"
            echo "TELEMACHUS_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Test, lint, and build signed APK
        working-directory: AndroidClient
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug assembleRelease

      - name: Install and run verified ktlint
        working-directory: AndroidClient
        env:
          KTLINT_VERSION: 1.1.1
          KTLINT_SHA256: 9c64315aaa645ceeec867e22c511ec8614ae8dd77ff2102317052fa194249405
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output ktlint \
            "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          echo "${KTLINT_SHA256}  ktlint" | sha256sum --check
          chmod 0755 ktlint
          ./ktlint --relative "app/src/**/*.kt"

      - name: Verify release signature and rename APK
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          EXPECTED_CERT_SHA256: 9202835a99e6d311ae98536d616b7cbbfe8ada31b320d55aa37810a255e1ed71
        run: |
          APK=AndroidClient/app/build/outputs/apk/release/app-release.apk
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee signing.txt
          if grep -q "CN=Android Debug" signing.txt; then
            echo "Refusing to publish a debug-signed release."
            exit 1
          fi
          grep -Fq "Number of signers: 1" signing.txt || {
            echo "Release APK must have exactly one signer."
            exit 1
          }
          grep -Fq "certificate SHA-256 digest: $EXPECTED_CERT_SHA256" signing.txt || {
            echo "Release certificate does not match the established Telemachus update key."
            exit 1
          }
          cp "$APK" "Telemachus-${VERSION}-android.apk"
          sha256sum "Telemachus-${VERSION}-android.apk" \
            > "Telemachus-${VERSION}-android.apk.sha256"
          cp AndroidClient/app/build/generated/oss-notices/ANDROID_RUNTIME_DEPENDENCY_LICENSES.md \
            Android-runtime-dependency-licenses.md

      - name: Upload Android artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: android-apk
          if-no-files-found: error
          path: |
            Telemachus-*.apk
            Telemachus-*.apk.sha256
            Android-runtime-dependency-licenses.md

  create-release:
    needs: [validate, build-mac, build-android]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download macOS artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: macos-dmg
          path: artifacts

      - name: Download Android artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: android-apk
          path: artifacts

      - name: Add licenses and consolidated checksums
        run: |
          cp LICENSE NOTICE artifacts/
          cp licenses/Apache-2.0.txt artifacts/
          (
            cd artifacts
            sha256sum Telemachus-*.dmg Telemachus-*.apk > SHA256SUMS
          )

      - name: Generate release notes
        id: changelog
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          NOTES="$(awk -v ver="$VERSION" '
            $0 == "## [" ver "]" || index($0, "## [" ver "] - ") == 1 {flag=1; next}
            flag && /^---$/ {exit}
            flag {print}
          ' CHANGELOG.md)"
          test -n "$NOTES"
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          name: Telemachus ${{ needs.validate.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            Verify downloads against `SHA256SUMS`.

            macOS trust level: `${{ needs.build-mac.outputs.release_mode }}`.
            A `mac-universal.dmg` is Developer ID signed, hardened, notarized,
            and stapled. A filename containing `unsigned-source-build` is only
            ad-hoc signed from reviewed source and will trigger normal Gatekeeper
            warnings; it is never presented as notarized.
          files: |
            artifacts/Telemachus-*.dmg
            artifacts/Telemachus-*.apk
            artifacts/Telemachus-*.sha256
            artifacts/SHA256SUMS
            artifacts/LICENSE
            artifacts/NOTICE
            artifacts/Apache-2.0.txt
            artifacts/Android-runtime-dependency-licenses.md
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' || needs.build-mac.outputs.release_mode != 'developer-id' }}
