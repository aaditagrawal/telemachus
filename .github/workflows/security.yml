name: Secret scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install checksum-pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/$ARCHIVE"
          echo "$GITLEAKS_SHA256  $RUNNER_TEMP/$ARCHIVE" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/$ARCHIVE" -C "$RUNNER_TEMP" gitleaks

      - name: Scan committed history and proposed changes
        run: |
          "$RUNNER_TEMP/gitleaks" git --no-banner --redact --exit-code 1 .
